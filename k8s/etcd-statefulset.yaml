apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: rate-limiter
spec:
  serviceName: etcd          # must match the headless Service below
  replicas: 3
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.12
          ports:
            - containerPort: 2379   # client
            - containerPort: 2380   # peer
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /usr/local/bin/etcd
            - --name=$(MY_POD_NAME)
            - --data-dir=/var/lib/etcd
            - --listen-peer-urls=http://0.0.0.0:2380
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://$(MY_POD_NAME).etcd.$(MY_POD_NAMESPACE).svc.cluster.local:2379
            - --initial-advertise-peer-urls=http://$(MY_POD_NAME).etcd.$(MY_POD_NAMESPACE).svc.cluster.local:2380
            - --initial-cluster=etcd-0=http://etcd-0.etcd.$(MY_POD_NAMESPACE).svc.cluster.local:2380,etcd-1=http://etcd-1.etcd.$(MY_POD_NAMESPACE).svc.cluster.local:2380,etcd-2=http://etcd-2.etcd.$(MY_POD_NAMESPACE).svc.cluster.local:2380
            - --initial-cluster-state=new
            - --initial-cluster-token=rate-limiter-etcd
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: rate-limiter
spec:
  clusterIP: None    # headless — DNS returns individual pod IPs
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
    - name: peer
      port: 2380

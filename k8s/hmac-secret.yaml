apiVersion: v1
kind: Secret
metadata:
  name: rate-limiter-hmac
  namespace: rate-limiter
type: Opaque
# stringData is base64-encoded by the API server on write.
# In production, manage this with Sealed Secrets or an External Secrets Operator
# rather than committing the plaintext value to version control.
stringData:
  RATE_LIMIT_HMAC_SECRET: "replace-with-a-cryptographically-random-secret"

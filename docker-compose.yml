name: rate-limiter

services:

  # ── etcd (single-node for local dev) ────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/var/lib/etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=rate-limiter-local
    volumes:
      - etcd-data:/var/lib/etcd
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2379/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── rate-limiter (Rust TCP + HTTP server) ────────────────────────────────────
  rate-limiter:
    build:
      context: .
      dockerfile: Dockerfile
    # Mount the compose-specific config so the server reaches etcd by service name.
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
    ports:
      - "9000:9000"   # FlatBuffers binary TCP
      - "8080:8080"   # HTTP API (X-RateLimit-* headers)
    environment:
      RUST_LOG: "rate_limiting=info"
      # Supply a non-empty value to enable X-Rate-Hmac signing:
      #   RATE_LIMIT_HMAC_SECRET=<random> docker compose up
      RATE_LIMIT_HMAC_SECRET: "${RATE_LIMIT_HMAC_SECRET:-}"
    depends_on:
      etcd:
        condition: service_healthy

  # ── Python FastAPI demo app ──────────────────────────────────────────────────
  python-app:
    build:
      context: clients/python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      RATE_LIMITER_HOST: rate-limiter
      RATE_LIMITER_PORT: "9000"
    depends_on:
      - rate-limiter

volumes:
  etcd-data:

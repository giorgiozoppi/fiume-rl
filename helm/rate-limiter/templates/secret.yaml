{{/*
Create the HMAC secret only when:
  - strict_security is enabled, AND
  - no existingSecret is referenced (i.e., the chart manages it), AND
  - a literal secret value was provided in values.server.strictSecurity.secret.

For production, leave server.strictSecurity.secret empty and point
server.strictSecurity.existingSecret at a secret managed by Sealed Secrets
or an External Secrets Operator.
*/}}
{{- if .Values.server.strictSecurity.enabled }}
{{- if not .Values.server.strictSecurity.existingSecret }}
{{- if .Values.server.strictSecurity.secret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rate-limiter.fullname" . }}-hmac
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rate-limiter.labels" . | nindent 4 }}
type: Opaque
stringData:
  RATE_LIMIT_HMAC_SECRET: {{ .Values.server.strictSecurity.secret | quote }}
{{- end }}
{{- end }}
{{- end }}

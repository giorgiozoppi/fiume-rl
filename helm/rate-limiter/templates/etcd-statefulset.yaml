{{- if .Values.etcd.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rate-limiter.etcdName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rate-limiter.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  serviceName: {{ include "rate-limiter.etcdName" . }}
  replicas: {{ .Values.etcd.replicas }}
  selector:
    matchLabels:
      {{- include "rate-limiter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        {{- include "rate-limiter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: etcd
    spec:
      containers:
        - name: etcd
          image: "{{ .Values.etcd.image.repository }}:{{ .Values.etcd.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /usr/local/bin/etcd
            - --name=$(MY_POD_NAME)
            - --data-dir=/var/lib/etcd
            - --listen-peer-urls=http://0.0.0.0:2380
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://$(MY_POD_NAME).{{ include "rate-limiter.etcdName" . }}.$(MY_POD_NAMESPACE).svc.cluster.local:2379
            - --initial-advertise-peer-urls=http://$(MY_POD_NAME).{{ include "rate-limiter.etcdName" . }}.$(MY_POD_NAMESPACE).svc.cluster.local:2380
            - --initial-cluster={{ include "rate-limiter.etcdInitialCluster" . }}
            - --initial-cluster-state=new
            - --initial-cluster-token={{ .Release.Name }}-etcd
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
          resources:
            {{- toYaml .Values.etcd.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.etcd.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rate-limiter.etcdName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rate-limiter.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  clusterIP: None   # headless — DNS resolves to individual pod IPs
  selector:
    {{- include "rate-limiter.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
  ports:
    - name: client
      port: 2379
    - name: peer
      port: 2380
{{- end }}
